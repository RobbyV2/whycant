name: ci

on:
  push:
  pull_request:

jobs:
  linux-glibc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libacl1-dev
      - run: cargo build
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check

  linux-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --no-default-features --target x86_64-unknown-linux-musl
      - run: cargo test --no-default-features
      - run: cargo fmt --check

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check

  cross-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, x86_64-unknown-freebsd
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --target x86_64-apple-darwin -- -D warnings
      - run: cargo clippy --target x86_64-unknown-freebsd -- -D warnings

  root-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libacl1-dev acl
      - run: sudo -E env "PATH=$PATH" cargo test --features root-tests
